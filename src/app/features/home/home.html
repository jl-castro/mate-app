<mat-card>
  <h1>Modo de práctica</h1>

  <div class="level-selector">
    <label>Nivel:</label>

    <button class="level-btn" mat-icon-button (click)="decreaseLevel()" [disabled]="level <= 1">
      <span>➖</span>
    </button>

    <span class="level-value">{{ level }}</span>

    <button class="level-btn" mat-icon-button (click)="increaseLevel()" [disabled]="level >= 5">
      <span>➕</span>
    </button>
  </div>

  <div class="modes">
    <button class="operation-btn" mat-raised-button color="primary" [routerLink]="['/quiz/addition']">➕ Suma</button>

    <button class="operation-btn" mat-raised-button color="accent" [routerLink]="['/quiz/multiplication']">✖️ Multiplicación</button>

    <button class="operation-btn" mat-raised-button color="warn" [routerLink]="['/quiz/subtraction']">➖ Resta</button>

    <button class="operation-btn" mat-raised-button color="success" [routerLink]="['/quiz/division']">➗ División</button>

    <button class="operation-btn" mat-raised-button color="primary" routerLink="/fractions/add">➕ Suma de Fracciones</button>

    <button class="operation-btn" mat-raised-button color="primary" routerLink="/fractions/sub">➖ Resta de Fracciones</button>
  </div>
</mat-card>
